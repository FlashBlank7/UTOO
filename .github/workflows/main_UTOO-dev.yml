name: Build and deploy UTOO to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: utoo-azure-deploy
  cancel-in-progress: true

env:
  AZURE_WEBAPP_NAME: UTOO-dev
  AZURE_RESOURCE_GROUP: utoo-dev_group
  AZURE_WEBAPP_PACKAGE_PATH: backend
  ALLOWED_ORIGINS: https://utoo-dev-f9d3b4fteaaqb8e9.japaneast-01.azurewebsites.net
  DATABASE_URL: sqlite+aiosqlite:////home/data/utoo.db
  ACCESS_TOKEN_EXPIRE_MINUTES: "120"
  REFRESH_TOKEN_EXPIRE_DAYS: "30"
  PYTHON_PACKAGE_DIR: backend/.python_packages/lib/site-packages
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Copy frontend build into backend
        run: |
          rm -rf backend/app/static
          mkdir -p backend/app/static
          cp -R frontend/dist/. backend/app/static/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate backend package
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m compileall app alembic

      - name: Vendor backend dependencies
        run: |
          rm -rf "${{ env.PYTHON_PACKAGE_DIR }}"
          python -m pip install --target "${{ env.PYTHON_PACKAGE_DIR }}" --no-cache-dir -r backend/requirements.txt

      - name: Create Azure deployment zip
        run: |
          rm -f backend-deploy.zip
          cd backend
          zip -r ../backend-deploy.zip . -x "*/__pycache__/*" "*.pyc"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_00DBB7F84C9B413EAFEC5754E8B48C36 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3BAC7D48E25A4943833C7DD9614C183F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_9F5D89B791134383B3B5B644B0994210 }}

      - name: Configure Azure App Service
        run: |
          az webapp config set \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --startup-file "bash startup.sh"
          az webapp config appsettings set \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              ENABLE_ORYX_BUILD=false \
              ALLOWED_ORIGINS="${{ env.ALLOWED_ORIGINS }}" \
              DATABASE_URL="${{ env.DATABASE_URL }}" \
              ACCESS_TOKEN_EXPIRE_MINUTES="${{ env.ACCESS_TOKEN_EXPIRE_MINUTES }}" \
              REFRESH_TOKEN_EXPIRE_DAYS="${{ env.REFRESH_TOKEN_EXPIRE_DAYS }}"

      - name: Ensure Azure Web App is running before deploy
        run: |
          az webapp start \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "${{ env.AZURE_WEBAPP_NAME }}"

      - name: Deploy zip to Azure Web App
        timeout-minutes: 10
        run: |
          az webapp deploy \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --src-path backend-deploy.zip \
            --type zip \
            --clean true \
            --restart false

      - name: Start Azure Web App
        if: always()
        run: |
          az webapp start \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "${{ env.AZURE_WEBAPP_NAME }}"
