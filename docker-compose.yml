services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: utoo
      POSTGRES_PASSWORD: utoo_secret
      POSTGRES_DB: utoo_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U utoo -d utoo_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://utoo:utoo_secret@db:5432/utoo_db
      SECRET_KEY: change-this-in-production-use-a-long-random-string
      ACCESS_TOKEN_EXPIRE_MINUTES: 120
      REFRESH_TOKEN_EXPIRE_DAYS: 30
      BACKEND_PORT: 8010
    ports:
      - "8010:8010"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "5174:80"
    depends_on:
      - backend

volumes:
  postgres_data:
